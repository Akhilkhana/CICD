name: Model Training CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run model training
        run: python train_model.py

      - name: Build CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cml
          echo "## Model Scores" > report.md
          cat scores.txt >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix & Feature Importance" >> report.md
          echo "![Confusion Matrix](./ConfusionMatrix.png)" >> report.md
          echo "![Feature Importance](./FeatureImportance.png)" >> report.md
          cml comment create report.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-outputs
          path: |
            scores.txt
            ConfusionMatrix.png
            FeatureImportance.png
